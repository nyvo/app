# Public Stripe Connect checkout (guest buyers) — unauthenticated posture;
# abuse is rate-limited inside. Stripe migration Phase 2.
[functions.create-stripe-connect-session]
verify_jwt = false

[functions.create-free-signup]
verify_jwt = false

[functions.stripe-billing-webhook]
verify_jwt = false

# Stripe Connect marketplace webhook (destination-charge events). Stripe signs via the
# Stripe-Signature header, not a Supabase JWT. Stripe migration Phase 2.
[functions.stripe-connect-webhook]
verify_jwt = false

# Stripe Connect connected-account events (Destination 2: account.updated / payout.paid).
# Stripe signs via the Stripe-Signature header, not a Supabase JWT. Stripe migration Phase 5.
[functions.stripe-connect-account-events]
verify_jwt = false

[functions.sweep-pending-payments]
verify_jwt = false

[functions.send-email]
verify_jwt = false

[functions.send-pending-confirmations]
verify_jwt = false

# Cron-only (x-cron-secret / service-role checked inside).
[functions.send-class-reminders]
verify_jwt = false

# Cron-only ops monitor. The daily cron POSTs x-cron-secret with no JWT, so this
# MUST stay verify_jwt=false — without this block a plain `supabase functions
# deploy` would apply the config default (true) and the gateway would 401 the
# cron before it runs, silently taking monitoring offline.
[functions.ops-health-alert]
verify_jwt = false

# Trigger-only owner alerts (new booking / seller / user). The DB triggers POST
# x-cron-secret with no JWT — same posture and rationale as ops-health-alert.
[functions.owner-event-alert]
verify_jwt = false
