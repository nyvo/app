[functions.stripe-connect-webhook]
verify_jwt = false

[functions.sweep-pending-payments]
verify_jwt = false

[functions.send-email]
verify_jwt = false

[functions.send-pending-confirmations]
verify_jwt = false

[functions.team-actions]
verify_jwt = false

[functions.send-booking-claim-link]
verify_jwt = false
