<!-- Subject: {{ .Token }} er innloggingskoden din -->
<div style="background-color:#f9f9f9;margin:0;padding:56px 16px 40px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
  <div style="max-width:560px;margin:0 auto;">
    <div style="background-color:#ffffff;border:1px solid #e8e8e8;border-radius:12px;padding:48px 40px 40px;">
      <p style="font-size:15px;font-weight:500;color:#1f1f1f;margin:0 0 40px;">UpNext</p>

      <h1 style="font-size:22px;font-weight:600;color:#1f1f1f;letter-spacing:-0.01em;line-height:28px;margin:0 0 20px;">
        Logg inn
      </h1>

      <p style="font-size:14px;color:#1f1f1f;line-height:24px;margin:0 0 24px;">
        Skriv inn koden i nettleseren, eller klikk lenken under.
      </p>

      <p style="font-size:32px;font-weight:600;color:#1f1f1f;letter-spacing:0.12em;margin:28px 0;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;">
        {{ .Token }}
      </p>

      <p style="font-size:14px;color:#1f1f1f;line-height:24px;margin:0 0 24px;">
        <a href="{{ .ConfirmationURL }}" style="color:#1f1f1f;text-decoration:underline;text-underline-offset:2px;">Logg inn</a>
      </p>

      <p style="font-size:12px;line-height:20px;color:#8e8e8e;margin:32px 0 0;">
        Lenken og koden er gyldig i 60 minutter. Om du ikke prøvde å logge inn, kan du se bort fra denne e-posten.
      </p>
    </div>

    <p style="font-size:12px;line-height:20px;color:#8e8e8e;margin:28px 0 0;text-align:center;">
      Trenger du hjelp med UpNext? Skriv til <a href="mailto:hei@upnext.no" style="color:#717171;text-decoration:underline;text-underline-offset:2px;">hei@upnext.no</a>.
    </p>
  </div>
</div>
