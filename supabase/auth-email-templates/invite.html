  <p style="font-size:15px;font-weight:500;color:#191917;margin:0 0 40px;">Openspot</p>

  <h1 style="font-size:22px;font-weight:600;color:#191917;letter-spacing:-0.01em;line-height:28px;margin:0 0 16px;">
