<!-- Subject: {{ .Token }} er bekreftelseskoden din -->
<div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;max-width:560px;margin:0 auto;padding:48px 24px 24px;background:#ffffff;">
  <p style="font-size:15px;font-weight:500;color:#191917;margin:0 0 40px;">Openspot</p>

  <h1 style="font-size:22px;font-weight:600;color:#191917;letter-spacing:-0.01em;line-height:28px;margin:0 0 16px;">
    Bekreft e-posten din
  </h1>

  <p style="font-size:14px;color:#191917;line-height:22px;margin:0 0 24px;">
    Skriv inn koden i nettleseren for å opprette kontoen, eller klikk lenken under.
  </p>

  <p style="font-size:32px;font-weight:600;color:#191917;letter-spacing:0.12em;margin:24px 0;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;">
    {{ .Token }}
  </p>

  <p style="font-size:14px;color:#191917;line-height:22px;margin:0 0 24px;">
    <a href="{{ .ConfirmationURL }}" style="color:#191917;text-decoration:underline;text-underline-offset:2px;">Opprett konto</a>
  </p>

  <hr style="border:none;border-top:1px solid #e6e3df;margin:40px 0 24px;" />

  <p style="font-size:12px;line-height:20px;color:#8c8780;margin:0;">
    Lenken og koden er gyldig i 60 minutter. Om du ikke prøvde å opprette en konto, kan du se bort fra denne e-posten.
  </p>
</div>
