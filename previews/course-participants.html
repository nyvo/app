<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kursside — Påmeldte (minimal + drawer)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ── Studio design tokens (mirror src/index.css) ────────────────────── */
  :root {
    --sand-3:  oklch(0.953 0.005 89);
    --sand-5:  oklch(0.906 0.007 80);
    --sand-6:  oklch(0.881 0.008 80);
    --sand-8:  oklch(0.776 0.013 86);
    --sand-11: oklch(0.453 0.012 86);
    --sand-12: oklch(0.231 0.008 88);
    --jade-3:  oklch(0.953 0.034 158);
    --jade-11: oklch(0.516 0.081 165);
    --amber-3: oklch(0.972 0.067 100);
    --amber-11: oklch(0.557 0.131 65);
    --red-3:   oklch(0.946 0.024 17);
    --red-11:  oklch(0.563 0.226 25);

    --background:           oklch(1 0 0);
    --surface:              oklch(1 0 0);
    --muted:                var(--sand-3);
    --border:               var(--sand-6);
    --border-subtle:        var(--sand-5);
    --foreground-disabled:  var(--sand-8);
    --foreground-muted:     var(--sand-11);
    --foreground:           var(--sand-12);

    --success-subtle:  var(--jade-3);
    --success-fg:      var(--jade-11);
    --warning-subtle:  var(--amber-3);
    --warning-fg:      var(--amber-11);
    --danger-subtle:   var(--red-3);
    --danger-fg:       var(--red-11);

    --radius:      0.45rem;
    --radius-sm:   calc(var(--radius) * 0.6);
    --radius-md:   calc(var(--radius) * 0.8);
    --radius-lg:   var(--radius);
    --radius-xl:   calc(var(--radius) * 1.4);
    --radius-full: 9999px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--muted);
    color: var(--foreground);
    font-family: "Geist", ui-sans-serif, system-ui, -apple-system, sans-serif;
    font-size: 14px;
    line-height: 20px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: "ss01";
  }

  /* ── Lab chrome ─────────────────────────────────────────────────────── */
  .lab-bar {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--background);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
  }
  .lab-bar-inner {
    max-width: 1280px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .lab-bar-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--foreground-muted);
  }

  /* ── Page chrome ────────────────────────────────────────────────────── */
  .page {
    max-width: 1280px;
    margin: 0 auto;
    padding: 32px 24px 96px;
    background: var(--background);
    min-height: calc(100vh - 50px);
  }
  @media (min-width: 1024px) { .page { padding-top: 48px; } }

  .page-header { margin-bottom: 16px; }
  .page-title-wrap {
    display: flex;
    align-items: baseline;
    gap: 12px;
    flex-wrap: wrap;
  }
  .page-title {
    font-size: 24px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--foreground);
  }
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    height: 24px;
    padding: 0 8px;
    font-size: 13px;
    font-weight: 500;
    border-radius: var(--radius-sm);
    background: var(--success-subtle);
    color: var(--success-fg);
  }
  .status-badge::before {
    content: "";
    width: 6px;
    height: 6px;
    border-radius: var(--radius-full);
    background: var(--success-fg);
  }

  /* ── Tabs ───────────────────────────────────────────────────────────── */
  .tabs {
    display: flex;
    gap: 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .tab {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 0;
    margin-bottom: -1px;
    border: 0;
    border-bottom: 2px solid transparent;
    background: transparent;
    color: var(--foreground-muted);
    font-family: inherit;
    font-size: 16px;
    font-weight: 400;
    cursor: pointer;
  }
  .tab:hover { color: var(--foreground); }
  .tab.is-active {
    color: var(--foreground);
    font-weight: 500;
    border-bottom-color: var(--foreground);
  }
  .tab-count {
    display: inline-flex;
    align-items: center;
    padding: 0 7px;
    height: 18px;
    background: var(--muted);
    color: var(--foreground);
    font-size: 13px;
    font-weight: 500;
    border-radius: var(--radius-full);
    font-variant-numeric: tabular-nums;
  }

  /* ── Buttons ────────────────────────────────────────────────────────── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    height: 32px;
    padding: 0 12px;
    border-radius: var(--radius-full);
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid transparent;
    white-space: nowrap;
    transition: background 150ms ease;
  }
  .btn-primary { background: var(--foreground); color: var(--background); }
  .btn-primary:hover { background: oklch(0.18 0.008 88); }
  .btn-secondary {
    background: var(--background);
    color: var(--foreground);
    border-color: var(--border);
  }
  .btn-secondary:hover { background: var(--muted); }
  .btn-danger {
    background: var(--background);
    color: var(--danger-fg);
    border-color: var(--border);
  }
  .btn-danger:hover { background: var(--danger-subtle); border-color: var(--danger-fg); }
  .btn[disabled] { cursor: not-allowed; opacity: 0.5; }

  /* ── Filter chips (toolbar left) ─────────────────────────────────────── */
  .chip-group {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    margin-right: auto;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    height: 28px;
    padding: 0 12px;
    border-radius: var(--radius-full);
    border: 1px solid var(--border);
    background: transparent;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--foreground-muted);
    cursor: pointer;
    transition: background 120ms ease, color 120ms ease, border-color 120ms ease;
  }
  .chip:hover { color: var(--foreground); background: var(--muted); }
  .chip.is-active {
    background: var(--foreground);
    color: var(--background);
    border-color: var(--foreground);
  }
  .chip-count {
    font-variant-numeric: tabular-nums;
    font-weight: 500;
    color: inherit;
    opacity: 0.7;
  }
  .chip.is-active .chip-count { opacity: 0.85; }

  /* ── Participants table — minimal ────────────────────────────────────
     Columns: avatar / name+email / note icon / status / chevron.
     Everything else lives in the drawer that opens on row click. */
  .table-container {
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    background: var(--surface);
  }
  .table-toolbar {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .table-header,
  .table-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 60px 140px 20px;
    align-items: center;
    gap: 16px;
    padding: 12px 16px;
  }
  /* The first column is the identity unit: avatar + name + email together,
     so the column header "Navn" anchors at the row's true leading edge. */
  .identity {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }
  .table-header {
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    color: var(--foreground-muted);
    font-size: 16px;
  }
  .table-row {
    border: 0;
    background: var(--surface);
    width: 100%;
    text-align: left;
    font: inherit;
    color: inherit;
    cursor: pointer;
    transition: background 120ms ease;
  }
  .table-row + .table-row { border-top: 1px solid var(--border); }
  .table-row:hover { background: var(--muted); }
  .table-row.is-dim { opacity: 0.6; }
  .table-row:focus-visible {
    outline: 2px solid var(--foreground);
    outline-offset: -2px;
  }

  /* Avatar — neutral silhouette only (Studio rule) */
  .avatar {
    width: 32px;
    height: 32px;
    border-radius: var(--radius-full);
    background: var(--muted);
    color: var(--foreground-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .avatar svg { width: 16px; height: 16px; fill: currentColor; }
  .table-row:hover .avatar { background: var(--background); }

  .name-cell { min-width: 0; }
  .name-text {
    font-size: 16px;
    font-weight: 500;
    color: var(--foreground);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .is-dim .name-text { color: var(--foreground-muted); }
  .email-text {
    font-size: 14px;
    color: var(--foreground-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }

  /* Note icon (cell shows icon when a note exists, else empty) */
  .note-icon {
    width: 18px;
    height: 18px;
    color: var(--foreground);
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .note-icon svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }

  /* Status pill */
  .status-pill {
    display: inline-flex;
    align-items: center;
    height: 22px;
    padding: 0 8px;
    border-radius: var(--radius-full);
    font-size: 12px;
    font-weight: 500;
    line-height: 1;
  }
  .status-paid     { background: var(--success-subtle); color: var(--success-fg); }
  .status-pending  { background: var(--warning-subtle); color: var(--warning-fg); }
  .status-failed   { background: var(--danger-subtle); color: var(--danger-fg); }
  .status-refunded { background: var(--muted); color: var(--foreground-muted); }
  .status-cancelled { background: var(--muted); color: var(--foreground-muted); }
  .status-waitlist { background: var(--muted); color: var(--foreground-muted); }

  /* Chevron — indicates the row opens a drawer. Soft until hover. */
  .chev {
    width: 20px;
    height: 20px;
    color: var(--foreground-muted);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: transform 150ms ease, color 150ms ease;
  }
  .chev svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }
  .table-row:hover .chev { color: var(--foreground); transform: translateX(2px); }

  /* ── Drawer (right-side sheet) ───────────────────────────────────────── */
  .drawer-backdrop {
    position: fixed;
    inset: 0;
    background: oklch(0 0 0 / 0.2);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    z-index: 40;
    opacity: 0;
    pointer-events: none;
    transition: opacity 200ms ease;
  }
  .drawer-backdrop.is-open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 100%;
    max-width: 440px;
    background: var(--surface);
    z-index: 50;
    transform: translateX(100%);
    transition: transform 240ms cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
    box-shadow: -8px 0 24px rgba(0,0,0,0.08);
  }
  .drawer.is-open { transform: translateX(0); }

  .drawer-head {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border-subtle);
    position: relative;
  }
  .drawer-close {
    position: absolute;
    top: 16px; right: 16px;
    width: 28px; height: 28px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: 0;
    background: transparent;
    color: var(--foreground-muted);
    cursor: pointer;
    border-radius: 6px;
  }
  .drawer-close:hover { color: var(--foreground); background: var(--muted); }
  .drawer-identity {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-right: 32px;
  }
  .drawer-identity .avatar { width: 40px; height: 40px; }
  .drawer-identity .avatar svg { width: 20px; height: 20px; }
  .drawer-name {
    font-size: 18px;
    font-weight: 500;
    color: var(--foreground);
    letter-spacing: -0.005em;
    line-height: 1.2;
  }
  .drawer-email {
    font-size: 14px;
    color: var(--foreground-muted);
    margin-top: 2px;
  }

  .drawer-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
  }
  .detail-section + .detail-section {
    margin-top: 8px;
    padding-top: 16px;
    border-top: 1px solid var(--border-subtle);
  }
  .detail-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    padding: 8px 0;
  }
  .detail-label {
    font-size: 14px;
    color: var(--foreground-muted);
    flex-shrink: 0;
  }
  .detail-value {
    font-size: 15px;
    color: var(--foreground);
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .detail-value.is-strike {
    color: var(--foreground-muted);
    text-decoration: line-through;
    text-decoration-color: oklch(0.453 0.012 86 / 0.6);
  }

  .note-card {
    margin-top: 8px;
    background: var(--muted);
    border-radius: var(--radius-md);
    padding: 12px 14px;
  }
  .note-card-text {
    font-size: 15px;
    color: var(--foreground);
    line-height: 22px;
    white-space: pre-wrap;
  }

  .drawer-foot {
    padding: 16px 24px;
    border-top: 1px solid var(--border-subtle);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
</style>
</head>
<body>

<div class="lab-bar">
  <div class="lab-bar-inner">
    <span class="lab-bar-title">Kursside · Påmeldte · klikk en rad for å åpne detaljer</span>
  </div>
</div>

<div class="page">
  <header class="page-header">
    <div class="page-title-wrap">
      <h1 class="page-title">Vinyasa Flow — onsdager</h1>
      <span class="status-badge">Pågår</span>
    </div>
  </header>

  <div class="tabs">
    <button class="tab">Oversikt</button>
    <button class="tab is-active">Påmeldte <span class="tab-count">12</span></button>
    <button class="tab">Rediger</button>
  </div>

  <div class="table-container">
    <div class="table-toolbar">
      <div class="chip-group" role="tablist" aria-label="Filtrer påmeldte">
        <button class="chip is-active" data-filter="all">Alle <span class="chip-count">12</span></button>
        <button class="chip" data-filter="attention">Trenger oppmerksomhet <span class="chip-count">3</span></button>
        <button class="chip" data-filter="cancelled">Avlyste <span class="chip-count">1</span></button>
      </div>
      <button class="btn btn-secondary">Send melding</button>
      <button class="btn btn-primary">Legg til deltaker</button>
    </div>

    <div class="table-header">
      <span>Navn</span>
      <span>Notat</span>
      <span>Status</span>
      <span aria-hidden></span>
    </div>

    <!-- Rows are buttons — entire row is the click target, opens drawer. -->

    <!-- 1. Healthy -->
    <button type="button" class="table-row" data-open-drawer="p1">
      <div class="identity"><div class="avatar"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v1.2c0 .7.5 1.2 1.2 1.2h16.8c.7 0 1.2-.5 1.2-1.2v-1.2c0-3.2-6.4-4.8-9.6-4.8z"/></svg></div><div class="name-cell">
        <div class="name-text">Marte Hansen</div>
        <div class="email-text">marte.hansen@example.com</div>
      </div></div>
      <span></span>
      <span></span>
      <span class="chev"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>
    </button>

    <!-- 2. Healthy -->
    <button type="button" class="table-row" data-open-drawer="p2">
      <div class="identity"><div class="avatar"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v1.2c0 .7.5 1.2 1.2 1.2h16.8c.7 0 1.2-.5 1.2-1.2v-1.2c0-3.2-6.4-4.8-9.6-4.8z"/></svg></div><div class="name-cell">
        <div class="name-text">Sander Olsen</div>
        <div class="email-text">sander.o@example.com</div>
      </div></div>
      <span></span>
      <span></span>
      <span class="chev"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>
    </button>

    <!-- 3. Drop-in -->
    <button type="button" class="table-row" data-open-drawer="p3">
      <div class="identity"><div class="avatar"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v1.2c0 .7.5 1.2 1.2 1.2h16.8c.7 0 1.2-.5 1.2-1.2v-1.2c0-3.2-6.4-4.8-9.6-4.8z"/></svg></div><div class="name-cell">
        <div class="name-text">Ingvild Berg</div>
        <div class="email-text">ingvild.berg@example.com</div>
      </div></div>
      <span></span>
      <span></span>
      <span class="chev"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>
    </button>

    <!-- 4. Student tier -->
    <button type="button" class="table-row" data-open-drawer="p4">
      <div class="identity"><div class="avatar"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v1.2c0 .7.5 1.2 1.2 1.2h16.8c.7 0 1.2-.5 1.2-1.2v-1.2c0-3.2-6.4-4.8-9.6-4.8z"/></svg></div><div class="name-cell">
        <div class="name-text">Elias Knudsen</div>
        <div class="email-text">elias.knudsen@student.uio.no</div>
      </div></div>
      <span></span>
      <span></span>
      <span class="chev"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>
    </button>

    <!-- 5. Has note -->
    <button type="button" class="table-row" data-open-drawer="p5">
      <div class="identity"><div class="avatar"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v1.2c0 .7.5 1.2 1.2 1.2h16.8c.7 0 1.2-.5 1.2-1.2v-1.2c0-3.2-6.4-4.8-9.6-4.8z"/></svg></div><div class="name-cell">
        <div class="name-text">Kari Nordmann</div>

      <span class="note-icon" title="Har notat"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span>
      <span></span>
      <span class="chev"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>
    </button>

    <!-- 6. Drop-in + note -->
    <button type="button" class="table-row" data-open-drawer="p6">
      <div class="identity"><div class="avatar"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v1.2c0 .7.5 1.2 1.2 1.2h16.8c.7 0 1.2-.5 1.2-1.2v-1.2c0-3.2-6.4-4.8-9.6-4.8z"/></svg></div><div class="name-cell">
        <div class="name-text">Tor Andersen</div>
        <div class="email-text">tor.andersen@example.com</div>
      </div></div>
      <span class="note-icon" title="Har notat"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span>
      <span></span>
      <span class="chev"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>
    </button>

        <div class="name-text">Petter Solberg</div>
        <div class="email-text">petter.solberg@example.com</div>
      </div></div>
      <span></span>
      <span><span class="status-pill status-failed">Mislykket betaling</span></span>
      <span class="chev"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>
    </button>

    <!-- 9. Refunded -->
    <button type="button" class="table-row" data-open-drawer="p9">
      <div class="identity"><div class="avatar"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v1.2c0 .7.5 1.2 1.2 1.2h16.8c.7 0 1.2-.5 1.2-1.2v-1.2c0-3.2-6.4-4.8-9.6-4.8z"/></svg></div><div class="name-cell">
        <div class="name-text">Anne Larsen</div>
        <div class="email-text">anne.larsen@example.com</div>
      </div></div>
      <span></span>
      <span><span class="status-pill status-refunded">Refundert</span></span>
      <span class="chev"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>
    </button>

    <!-- 10. Cancelled -->
    <button type="button" class="table-row is-dim" data-open-drawer="p10">
      <div class="identity"><div class="avatar"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v1.2c0 .7.5 1.2 1.2 1.2h16.8c.7 0 1.2-.5 1.2-1.2v-1.2c0-3.2-6.4-4.8-9.6-4.8z"/></svg></div><div class="name-cell">
        <div class="name-text">Jon Hauge</div>
        <div class="email-text">jon.hauge@example.com</div>
      </div></div>
      <span></span>
      <span><span class="status-pill status-cancelled">Avlyst</span></span>
      <span class="chev"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>
    </button>

    <!-- 11. Waitlist -->
    <button type="button" class="table-row" data-open-drawer="p11">
      <div class="identity"><div class="avatar"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v1.2c0 .7.5 1.2 1.2 1.2h16.8c.7 0 1.2-.5 1.2-1.2v-1.2c0-3.2-6.4-4.8-9.6-4.8z"/></svg></div><div class="name-cell">
        <div class="name-text">Frida Eide</div>
        <div class="email-text">frida.eide@example.com</div>
      </div></div>
      <span></span>
      <span><span class="status-pill status-waitlist">Venteliste</span></span>
      <span class="chev"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>
    </button>

    <!-- 12. Gratis + Personale -->
    <button type="button" class="table-row" data-open-drawer="p12">
      <div class="identity"><div class="avatar"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v1.2c0 .7.5 1.2 1.2 1.2h16.8c.7 0 1.2-.5 1.2-1.2v-1.2c0-3.2-6.4-4.8-9.6-4.8z"/></svg></div><div class="name-cell">
        <div class="name-text">Synne Moen</div>

      </div></div>
      <span></span>
      <span></span>
      <span class="chev"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>
    </button>
  </div>
</div>

<!-- ── Drawer (right-side sheet) ─────────────────────────────────────── -->
<div class="drawer-backdrop" id="drawer-backdrop"></div>
<aside class="drawer" id="drawer" role="dialog" aria-labelledby="drawer-name">
  <div class="drawer-head">
    <button class="drawer-close" id="drawer-close" aria-label="Lukk">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="drawer-identity">
      <div class="avatar"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v1.2c0 .7.5 1.2 1.2 1.2h16.8c.7 0 1.2-.5 1.2-1.2v-1.2c0-3.2-6.4-4.8-9.6-4.8z"/></svg></div>
      <div>
        <div class="drawer-name" id="drawer-name">Marte Hansen</div>
        <div class="drawer-email" id="drawer-email">marte.hansen@example.com</div>
      </div>
    </div>
  </div>

  <div class="drawer-body" id="drawer-body">
    <!-- Populated by JS based on which row was clicked -->
  </div>

  <div class="drawer-foot" id="drawer-foot">
    <!-- Populated by JS -->
  </div>
</aside>

<script>
  // ── Participant data — mirrors the scenarios in the table ─────────────
  // For mock purposes, fields are hand-rolled; in production these come from
  // the signup row + joined ticket_type, course, etc.
  const PARTICIPANTS = {
    p1: { name:'Marte Hansen', email:'marte.hansen@example.com',
          signupDate:'onsdag 7. mai',
          ticket:'Kursrekken (8 timer)', amount:'1 200 kr',
          paymentStatus:'paid', state:'healthy' },
    p2: { name:'Sander Olsen', email:'sander.o@example.com',
          signupDate:'mandag 5. mai',
          ticket:'Kursrekken (8 timer)', amount:'1 200 kr',
          paymentStatus:'paid', state:'healthy' },
    p3: { name:'Ingvild Berg', email:'ingvild.berg@example.com',
          signupDate:'i dag', ticket:'Drop-in', amount:'250 kr',
          paymentStatus:'paid', state:'healthy' },
    p4: { name:'Elias Knudsen', email:'elias.knudsen@student.uio.no',
          signupDate:'fredag 9. mai',
          ticket:'Kursrekken — student', amount:'800 kr',
          paymentStatus:'paid', state:'healthy' },
    p5: { name:'Kari Nordmann', email:'kari.nordmann@example.com',
          signupDate:'tirsdag 6. mai',
          ticket:'Kursrekken (8 timer)', amount:'1 200 kr',
          paymentStatus:'paid', state:'healthy',
          note:'Har en kneskade — trenger å hoppe over enkelte stillinger. Ga beskjed på e-post i forkant.' },
    p6: { name:'Tor Andersen', email:'tor.andersen@example.com',
          signupDate:'i dag', ticket:'Drop-in', amount:'250 kr',
          paymentStatus:'paid', state:'healthy',
          note:'Første gang. Lurer på om jeg bør ta med eget håndkle.' },
    p7: { name:'Liv Karlsen', email:'liv.karlsen@example.com',
          signupDate:'mandag 19. mai',
          ticket:'Kursrekken (8 timer)', amount:'1 200 kr',
          paymentStatus:'pending', state:'pending' },
    p8: { name:'Petter Solberg', email:'petter.solberg@example.com',
          signupDate:'søndag 18. mai',
          ticket:'Kursrekken (8 timer)', amount:'1 200 kr',
          paymentStatus:'failed', state:'failed' },
    p9: { name:'Anne Larsen', email:'anne.larsen@example.com',
          signupDate:'tirsdag 29. april',
          ticket:'Kursrekken (8 timer)', amount:'1 200 kr',
          refundDate:'mandag 12. mai',
          paymentStatus:'refunded', state:'refunded' },
    p10:{ name:'Jon Hauge', email:'jon.hauge@example.com',
          signupDate:'torsdag 1. mai',
          ticket:'Kursrekken (8 timer)', amount:'1 200 kr',
          paymentStatus:'refunded', state:'cancelled' },
    p11:{ name:'Frida Eide', email:'frida.eide@example.com',
          signupDate:'i dag',
          ticket:'Kursrekken (8 timer)', amount:'1 200 kr',
          paymentStatus:'pending', state:'waitlist' },
    p12:{ name:'Synne Moen', email:'synne.moen@example.com',
          signupDate:'mandag 5. mai',
          ticket:'Kursrekken — personale', amount:'Gratis',
          paymentStatus:'paid', state:'free' },
  };

  const PAYMENT_LABEL = {
    paid:'Betalt', pending:'Avventer', failed:'Mislykket', refunded:'Refundert',
  };

  function row(label, value, opts = {}) {
    return `
      <div class="detail-row">
        <span class="detail-label">${label}</span>
        <span class="detail-value ${opts.strike ? 'is-strike' : ''}">${value}</span>
      </div>`;
  }

  // Action footers per state — mirrors what's currently in the dot menu.
  function buildFooter(p) {
    const actions = [];
    if (p.state === 'pending' || p.state === 'failed') {
      actions.push(`<button class="btn btn-primary">Marker som betalt</button>`);
    }
    if (p.state === 'healthy' && p.paymentStatus === 'paid' && p.amount !== 'Gratis') {
      actions.push(`<button class="btn btn-secondary">Refunder</button>`);
    }
    if (p.state !== 'cancelled' && p.state !== 'refunded') {
      actions.push(`<button class="btn btn-danger">Avlys påmelding</button>`);
    }
    return actions.join('');
  }

  function buildBody(p) {
    const badge = `<span class="status-pill status-${p.paymentStatus}">${PAYMENT_LABEL[p.paymentStatus]}</span>`;
    const details = `
      <div class="detail-section">
        ${row('Påmeldt', p.signupDate)}
        ${row('Billett', p.ticket)}
        <div class="detail-row">
          <span class="detail-label">Betaling</span>
          <span class="detail-value">${badge}</span>
        </div>
        ${p.refundDate ? row('Refundert', p.refundDate) : ''}
        ${row('Beløp', p.amount, { strike: p.paymentStatus === 'refunded' || p.state === 'cancelled' })}
      </div>
    `;
    const noteBlock = p.note
      ? `<div class="detail-section">
           <span class="detail-label">Notat fra deltakeren</span>
           <div class="note-card">
             <p class="note-card-text">${p.note}</p>
           </div>
         </div>`
      : '';
    return details + noteBlock;
  }

  const drawer = document.getElementById('drawer');
  const backdrop = document.getElementById('drawer-backdrop');
  const nameEl = document.getElementById('drawer-name');
  const emailEl = document.getElementById('drawer-email');
  const bodyEl = document.getElementById('drawer-body');
  const footEl = document.getElementById('drawer-foot');

  function openDrawer(id) {
    const p = PARTICIPANTS[id];
    if (!p) return;
    nameEl.textContent = p.name;
    emailEl.textContent = p.email;
    bodyEl.innerHTML = buildBody(p);
    footEl.innerHTML = buildFooter(p);
    drawer.classList.add('is-open');
    backdrop.classList.add('is-open');
  }
  function closeDrawer() {
    drawer.classList.remove('is-open');
    backdrop.classList.remove('is-open');
  }

  document.querySelectorAll('[data-open-drawer]').forEach(row => {
    row.addEventListener('click', () => openDrawer(row.getAttribute('data-open-drawer')));
  });
  document.getElementById('drawer-close').addEventListener('click', closeDrawer);
  backdrop.addEventListener('click', closeDrawer);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

  // ── Filter chips — tag each row by category derived from its participant
  // data, then show/hide based on the active chip. Category mapping:
  //   attention = pending + failed + waitlist (needs action)
  //   cancelled = cancelled signups
  //   all       = everything visible
  function categoryOf(p) {
    if (p.state === 'cancelled') return 'cancelled';
    if (p.state === 'pending' || p.state === 'failed' || p.state === 'waitlist') return 'attention';
    return 'healthy';
  }
  document.querySelectorAll('[data-open-drawer]').forEach(row => {
    const id = row.getAttribute('data-open-drawer');
    const p = PARTICIPANTS[id];
    if (p) row.setAttribute('data-category', categoryOf(p));
  });

  function applyFilter(filter) {
    document.querySelectorAll('[data-open-drawer]').forEach(row => {
      const cat = row.getAttribute('data-category');
      const show = filter === 'all' || filter === cat;
      row.style.display = show ? '' : 'none';
    });
  }

  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.chip').forEach(c => c.classList.toggle('is-active', c === chip));
      applyFilter(chip.getAttribute('data-filter'));
    });
  });
</script>

</body>
</html>
