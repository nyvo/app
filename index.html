    <style>
      .static-homepage {
        display: none;
        box-sizing: border-box;
        min-height: 100vh;
        margin: 0;
        padding: 2rem 1.5rem;
        background: #f8fafc;
        color: #111827;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .static-homepage * { box-sizing: border-box; }
      .static-homepage__inner { width: min(64rem, 100%); margin: 0 auto; }
      .static-homepage__brand { color: inherit; font-size: 1.125rem; font-weight: 700; text-decoration: none; }
      .static-homepage__content { max-width: 44rem; padding: clamp(5rem, 12vw, 9rem) 0; }
      .static-homepage__eyebrow { margin: 0 0 1rem; color: #475569; font-size: 0.875rem; font-weight: 600; }
      .static-homepage h1 { margin: 0; font-size: clamp(2.25rem, 6vw, 4.5rem); line-height: 1.05; letter-spacing: -0.04em; }
      .static-homepage__intro { margin: 1.5rem 0 0; color: #475569; font-size: clamp(1.125rem, 2vw, 1.375rem); line-height: 1.6; }
      .static-homepage__links { display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 2rem; }
      .static-homepage__links a { color: #075985; font-weight: 600; text-underline-offset: 0.2em; }
    </style>
    <noscript>
      <style>.static-homepage { display: block; }</style>
    </noscript>

    <!-- React replaces this content after startup. Until then, it gives OAuth
         reviewers and non-JavaScript crawlers a complete, public description. -->

          <a class="static-homepage__brand" href="/" aria-label="UpNext, forside">UpNext</a>

            <h1>UpNext – påmelding og betaling for kurs</h1>
            <p class="static-homepage__intro">
              UpNext er en norsk påmeldings- og betalingsplattform. Opprett og publiser kurs,
              ta imot påmeldinger og betaling, og hold oversikt over deltakerne på ett sted.
            </p>
            <nav class="static-homepage__links" aria-label="Informasjon om UpNext">
              <a href="/om-oss">Om UpNext</a>
              <a href="/personvern">Personvern</a>
              <a href="/terms">Vilkår</a>
            </nav>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
